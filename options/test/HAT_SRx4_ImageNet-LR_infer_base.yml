name: Final
model_type: HATModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

tile:
  tile_size: 512 # max patch size for the tile mode
  tile_pad: 32
  
datasets:
  test_1:  # the 1st test dataset
    name: custom
    type: SingleImageDataset
    dataroot_lq: ./test/lr
    io_backend:
      type: disk

# network structures
network_g:
  compress_ratio: 3
  conv_scale: 0.01
  depths:
  - 6
  - 6
  - 6
  - 6
  - 6
  - 6
  embed_dim: 180
  img_range: 1.0
  img_size: 64
  in_chans: 3
  mlp_ratio: 2
  num_heads:
  - 6
  - 6
  - 6
  - 6
  - 6
  - 6
  overlap_ratio: 0.5
  resi_connection: 1conv
  squeeze_factor: 30
  type: HAT
  upsampler: pixelshuffle
  upscale: 4
  window_size: 16

# path
path:
  pretrain_network_g: experiments/final/models/net_g_latest.pth
  param_key_g: 'params_ema'

# validation settings
val:
  save_img: true
  selfensemble: true
  suffix: ~  # add suffix to saved images, if None, use exp name
